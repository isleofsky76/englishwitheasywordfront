<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Simple</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body style="background-color: #163D52; color: white; font-family: 'Poppins', sans-serif;">  
    <div class="wrapper">
        <div class="content" style="display: flex; flex-direction: column; align-items: center;">
           
            <div class="top-message expression-section" style="display: flex; justify-content: center; align-items: center; height: 20px; width: 100%; margin-bottom: 0px;">
                <p style="margin: 0; font-size: 24px; font-weight: 500; text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.8); font-family: 'Poppins', 'Noto Sans KR', sans-serif; margin-bottom: 10px;">
                    <span style="color: #E8F4FD;">영어작문 :</span> 
                    <span style="color: #00D6C2;">🧎‍♂️"환심을 사려고 애쓰다, 표현은?"</span>
                </p>
            </div>

            <div class="word-box vocab-section" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 200px; width: 100%; background-color: #163D52; margin-top: 5px; border: 4px solid #00D6C2; border-radius: 0px;">
                <h1 style="margin: 0; color: #FAD02E; font-weight: 700; font-size: 30px; font-family: 'Poppins', 'Noto Sans KR', sans-serif;">
                    curry favor
                </h1>
                <p style="margin: 8px 0 0 0; color: #87CEEB; font-weight: 400; font-size: 22px; font-family: 'Noto Sans KR', 'Spoqa Han Sans', sans-serif;">
                    = 발음: 커리 페이버 | 뜻: 🙇 환심을 사다
                </p>
            </div>

            <div id="word-container" class="dialogue-section" style="padding: 0px; background-color: #163D52; margin-top:-30px; width: 100%; height: 1500px; border-radius: 19px;">
                <p id="word-definition" class="nanum-gothic-coding-regular" style="color: #F7F9FA; font-size: 25.0px; font-weight: 400; opacity: 1; padding: 20px 25px 0px 15px;"></p>
                <p id="word-explanation" class="nanum-gothic-coding-regular" style="color: #FFFFFF; margin-top:30px; font-size: 25.0px; font-weight: 400; opacity: 1; padding: 20px 25px 0px 15px;"></p>
                <p id="word-pronunciation" class="nanum-gothic-coding-regular" style="color: #F7F9FA; font-size: 25.0px; font-weight: 400; opacity: 1; padding: 20px 25px 0px 15px;"></p>
                
                <!-- 이미지 표시 부분 -->
                <div id="word-image" style="display: none; text-align: center; padding: 20px; margin-top: -115px;">
                    <img id="displayed-image" src="" alt="word illustration" style="width: 450px !important; height: 300px !important; object-fit: contain !important; display: block; margin: 0 auto;" />
                    <p id="image-description" class="nanum-gothic-coding-regular" style="color: #F7F9FA; font-size: 40px; font-weight: 700; padding: 40px 25px 0px 0px; text-align: center;"></p>
                </div>
            </div>
            
            <div class="buttons-container" style="margin-top: 0px;">
                <button id="stop-pronouncing" class="btn btn-primary" style="color:#163D52;">Stop Pronouncing</button>
                <button id="auto-play" class="btn btn-primary" style="color:#163D52;">Auto Play</button>
            </div>

        </div>
    </div>

    <script src="test_simple.js"></script>
</body>
</html>
